# Paths (project_root derived from playbook location — works on any machine)
project_root: "{{ playbook_dir | dirname | dirname }}"
cloud_image_path: /var/lib/libvirt/images/ubuntu-24.04-cloudimg-amd64.img
vm_disk_dir: /var/lib/libvirt/images
vm_storage_pool: images-1
cloud_init_template_dir: "{{ project_root }}/cloud-init"

# VM defaults
vm_ram_mb: 4096
vm_vcpus: 4
vm_disk_size: 20G
vm_os_variant: ubuntu24.04
vm_network: default

# Ollama (host — reachable from VMs via virbr0 gateway)
ollama_host: 192.168.122.1
ollama_port: 11434
ollama_model: "qwen3:8b"

# Embedding model (pre-downloaded on host, copied into VMs)
embedding_model_path: "{{ project_root }}/models/embeddinggemma-300m-qat-Q8_0.gguf"
embedding_model_vm_path: /home/openclaw/.openclaw/models/embeddinggemma-300m-qat-Q8_0.gguf

# Cloudflare domain (used for gateway controlUi allowedOrigins)
cf_domain: "demo.example.com"

# SSH key to inject into VMs
ssh_public_key_file: ~/.ssh/openclaw_demo.pub
ssh_private_key_file: ~/.ssh/openclaw_demo
